<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Over</title>
    <link rel="stylesheet" href="endMenu.css">
    <link rel="stylesheet" href="ARCADECLASSIC.TTF">
</head>
<body>
    <div class="game-over-container">
        <div class="game-over-content">
            <h1 class="game-over-title">GAME OVER</h1>
            
            <div class="score-display">
                <div class="final-score">
                    <h2>Final Score</h2>
                    <div class="score-value" id="final-score">0</div>
                </div>
                
                <div class="combo-display">
                    <h2>Highest Combo</h2>
                    <div class="combo-value" id="highest-combo">0</div>
                </div>
            </div>
            
            <div class="leaderboard-section">
                <h3 class="leaderboard-title">Leaderboard</h3>
                <div class="leaderboard-list" id="end-leaderboard-list">
                    <!-- Leaderboard entries will be added here -->
                </div>
            </div>
            
            <div class="game-over-buttons">
                <button class="play-again-btn" id="play-again-btn">PLAY AGAIN</button>
                <button class="main-menu-btn" id="main-menu-btn">MAIN MENU</button>
            </div>
        </div>
    </div>
    
    <script src="endMenu.js"></script>
</body>
</html>
